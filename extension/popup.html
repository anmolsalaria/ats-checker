<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATS Resume Analyzer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="popup-container">
      <!-- Header -->
      <header class="popup-header">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10,9 9,9 8,9"/>
          </svg>
          <span>ATS Analyzer</span>
        </div>
      </header>

      <!-- Settings Section -->
      <section class="settings-section">
        <label for="apiUrl">Backend API URL</label>
        <input
          type="text"
          id="apiUrl"
          placeholder="http://localhost:8000"
          value="http://localhost:8000"
        />
        <button id="saveSettings" class="btn-small">Save</button>
      </section>

      <!-- Main Content -->
      <section class="main-section">
        <!-- Extract Job Description -->
        <div class="action-card">
          <h3>Job Description</h3>
          <p class="description">Extract the job description from the current page or paste it manually.</p>
          <div class="button-group">
            <button id="extractBtn" class="btn-primary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              Extract from Page
            </button>
          </div>
          <textarea
            id="jobDescription"
            placeholder="Job description will appear here, or paste it manually..."
            rows="6"
          ></textarea>
        </div>

        <!-- Resume Text -->
        <div class="action-card">
          <h3>Resume Text</h3>
          <p class="description">Paste your resume text below.</p>
          <textarea
            id="resumeText"
            placeholder="Paste your resume text here..."
            rows="6"
          ></textarea>
        </div>

        <!-- Analyze Button -->
        <button id="analyzeBtn" class="btn-primary btn-full" disabled>
          Analyze ATS Compatibility
        </button>
      </section>

      <!-- Results Section (hidden by default) -->
      <section id="resultsSection" class="results-section hidden">
        <h3>Analysis Results</h3>

        <!-- Score -->
        <div class="score-container">
          <div class="score-circle" id="scoreCircle">
            <span id="scoreValue">0</span>
            <span class="score-label">ATS Score</span>
          </div>
        </div>

        <div class="score-breakdown">
          <div class="score-item">
            <span class="score-item-label">Keyword Match</span>
            <span class="score-item-value" id="keywordScore">0%</span>
          </div>
          <div class="score-item">
            <span class="score-item-label">Semantic Similarity</span>
            <span class="score-item-value" id="semanticScore">0%</span>
          </div>
        </div>

        <!-- Matched Keywords -->
        <div class="keyword-section">
          <h4 class="section-title matched-title">Matched Keywords</h4>
          <div id="matchedKeywords" class="keyword-list"></div>
        </div>

        <!-- Missing Keywords -->
        <div class="keyword-section">
          <h4 class="section-title missing-title">Missing Keywords</h4>
          <div id="missingKeywords" class="keyword-list"></div>
        </div>

        <!-- Suggestions -->
        <div class="suggestions-section">
          <h4 class="section-title suggestions-title">Suggestions</h4>
          <ul id="suggestionsList" class="suggestions-list"></ul>
        </div>
      </section>

      <!-- Loading State -->
      <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>Analyzing your resume...</p>
      </div>

      <!-- Error State -->
      <div id="errorMessage" class="error-message hidden"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
